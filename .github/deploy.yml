name: Deploy Contract Risk API to Azure

# Trigger: runs on every push to main branch
on:
  push:
    branches:
      - main
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  # ── JOB 1: BUILD & TEST ─────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: 'npm'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Run tests (placeholder for now)
      - name: Run tests
        run: npm test

      # Step 5 — Package the app for deployment
      - name: Create deployment package
        run: zip -r release.zip . --exclude '*.git*' --exclude 'node_modules/*'

      # Step 6 — Upload the package as an artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  # ── JOB 2: DEPLOY TO AZURE ──────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      # Step 1 — Download the artifact from the build job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # Step 2 — Unzip the package
      - name: Unzip package
        run: unzip release.zip

      # Step 3 — Deploy to Azure Web App
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .
